<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Dosis - VetMed Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>

<body class="bg-gradient-to-br from-green-50 to-blue-50 min-h-screen text-gray-800">
  
  <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b border-green-100 p-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="#" class="text-2xl font-black bg-gradient-to-r from-green-600 to-blue-600 bg-clip-text text-transparent">🐾 VetMed Hub</a>
      <span class="text-sm font-bold text-green-600 bg-green-50 px-3 py-1 rounded-full">Kalkulator Medis</span>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-4 pt-12 pb-24">
    <div class="flex bg-white rounded-2xl shadow-lg overflow-hidden mb-12">
      <button class="tab-btn flex-1 py-5 font-bold text-green-700 bg-green-50 border-b-4 border-green-500" data-tab="konversi">⚖️ Berat</button>
      <button class="tab-btn flex-1 py-5 font-bold text-gray-500 border-b-4 border-transparent" data-tab="dosis">💉 Dosis</button>
      <button class="tab-btn flex-1 py-5 font-bold text-gray-500 border-b-4 border-transparent" data-tab="cairan">💧 Cairan</button>
    </div>

    <div class="tab-panel active bg-white p-8 rounded-3xl shadow-xl" data-tab="konversi">
      <h3 class="text-2xl font-black mb-6">Konversi Berat</h3>
      <div class="grid md:grid-cols-2 gap-8">
        <div>
          <input type="number" id="berat" placeholder="Masukkan angka..." class="w-full p-4 border-2 rounded-xl text-2xl font-bold mb-4 focus:border-green-500 outline-none">
          <div class="grid grid-cols-2 gap-4">
            <select id="satuan" class="p-4 border-2 rounded-xl font-bold">
              <option value="kg">Dari kg</option>
              <option value="lb">Dari lb</option>
            </select>
            <select id="target-satuan" class="p-4 border-2 rounded-xl font-bold">
              <option value="kg">Ke kg</option>
              <option value="lb">Ke lb</option>
              <option value="g">Ke gram</option>
            </select>
          </div>
        </div>
        <div class="bg-green-50 rounded-2xl p-8 text-center">
          <div id="hasil-konversi" class="text-6xl font-black text-green-600">0</div>
          <div id="satuan-hasil" class="text-xl font-bold text-green-800 uppercase">kg</div>
        </div>
      </div>
    </div>

    <div class="tab-panel bg-white p-8 rounded-3xl shadow-xl" data-tab="dosis">
      <h3 class="text-2xl font-black mb-6">Dosis Obat Per Spesies</h3>
      <div class="grid md:grid-cols-2 gap-8">
        <div class="space-y-4">
          <select id="spesies-dosis" class="w-full p-4 border-2 rounded-xl font-bold">
            <option value="anjing">🐕 Anjing</option>
            <option value="kucing">🐱 Kucing</option>
          </select>
          <select id="obat" class="w-full p-4 border-2 rounded-xl font-bold">
            <option value="">-- Pilih Obat --</option>
            <option value="amoxicillin" data-dosis-anjing="10-20" data-dosis-kucing="10-15" data-rute="PO/IV q12h">Amoxicillin</option>
            <option value="meloxicam" data-dosis-anjing="0.1-0.2" data-dosis-kucing="0.05-0.1" data-rute="PO/SC q24h">Meloxicam ⚠️</option>
            <option value="enrofloxacin" data-dosis-anjing="5-20" data-dosis-kucing="5-5" data-rute="PO/IV q24h">Enrofloxacin</option>
          </select>
          <input type="number" id="berat-dosis" placeholder="Berat hewan (kg)" class="w-full p-4 border-2 rounded-xl text-xl font-bold">
        </div>
        <div class="space-y-4">
          <div class="bg-blue-600 text-white p-6 rounded-2xl text-center">
            <p class="text-sm opacity-80 uppercase font-bold">Dosis Rendah</p>
            <div id="dosis-rendah-val" class="text-4xl font-black">0</div>
            <p id="dosis-rendah-unit" class="text-xs">mg total</p>
          </div>
          <div class="bg-indigo-600 text-white p-6 rounded-2xl text-center">
            <p class="text-sm opacity-80 uppercase font-bold">Dosis Tinggi</p>
            <div id="dosis-tinggi-val" class="text-4xl font-black">0</div>
            <p id="dosis-tinggi-unit" class="text-xs">mg total</p>
          </div>
          <div class="p-4 bg-yellow-50 border border-yellow-200 rounded-xl text-sm">
            <strong>Rute:</strong> <span id="rute-obat">-</span>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-panel bg-white p-8 rounded-3xl shadow-xl" data-tab="cairan">
      <h3 class="text-2xl font-black mb-6">Kebutuhan Cairan IV</h3>
      <div class="grid md:grid-cols-2 gap-8">
        <div class="space-y-4">
          <select id="spesies-cairan" class="w-full p-4 border-2 rounded-xl font-bold">
            <option value="anjing">🐕 Anjing (5 mL/kg/hr)</option>
            <option value="kucing">🐱 Kucing (4 mL/kg/hr)</option>
          </select>
          <input type="number" id="berat-cairan" placeholder="Berat hewan (kg)" class="w-full p-4 border-2 rounded-xl text-xl font-bold">
          <select id="kondisi" class="w-full p-4 border-2 rounded-xl font-bold">
            <option value="maintenance">Normal (Maintenance)</option>
            <option value="dehidrasi-5">Dehidrasi 5%</option>
            <option value="dehidrasi-10">Dehidrasi 10%</option>
          </select>
        </div>
        <div class="grid grid-cols-1 gap-4">
          <div class="bg-cyan-500 text-white p-6 rounded-2xl text-center">
            <div id="cairan-maintenance" class="text-5xl font-black">0</div>
            <p class="font-bold">mL / Jam</p>
          </div>
          <div class="bg-orange-500 text-white p-6 rounded-2xl text-center">
            <div id="cairan-defisit" class="text-5xl font-black">0</div>
            <p class="font-bold">mL Defisit (Total)</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // FUNGSI TAB
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.remove('bg-green-50', 'border-green-500', 'text-green-700');
          b.classList.add('text-gray-500', 'border-transparent');
        });
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        
        btn.classList.add('bg-green-50', 'border-green-500', 'text-green-700');
        btn.classList.remove('text-gray-500', 'border-transparent');
        document.querySelector(`.tab-panel[data-tab="${btn.dataset.tab}"]`).classList.add('active');
      });
    });

    // LOGIKA KONVERSI
    function updateKonversi() {
      const b = parseFloat(document.getElementById('berat').value) || 0;
      const f = document.getElementById('satuan').value;
      const t = document.getElementById('target-satuan').value;
      const faktor = { 
        kg: { kg: 1, lb: 2.204, g: 1000 }, 
        lb: { kg: 0.453, lb: 1, g: 453.5 } 
      };
      const res = (b * faktor[f][t]).toFixed(2);
      document.getElementById('hasil-konversi').innerText = res;
      document.getElementById('satuan-hasil').innerText = t;
    }

    // LOGIKA DOSIS OBAT
    function updateDosis() {
      const sp = document.getElementById('spesies-dosis').value;
      const b = parseFloat(document.getElementById('berat-dosis').value) || 0;
      const sel = document.getElementById('obat').options[document.getElementById('obat').selectedIndex];
      
      if (!sel.value || b <= 0) {
        document.getElementById('dosis-rendah-val').innerText = '0';
        document.getElementById('dosis-tinggi-val').innerText = '0';
        return;
      }

      const key = sp === 'anjing' ? 'dosisAnjing' : 'dosisKucing';
      const range = sel.dataset[key];
      const rute = sel.dataset.rute;

      if (range) {
        const [min, max] = range.split('-').map(parseFloat);
        document.getElementById('dosis-rendah-val').innerText = (min * b).toFixed(1);
        document.getElementById('dosis-tinggi-val').innerText = (max * b).toFixed(1);
        document.getElementById('dosis-rendah-unit').innerText = `${min} mg/kg`;
        document.getElementById('dosis-tinggi-unit').innerText = `${max} mg/kg`;
        document.getElementById('rute-obat').innerText = rute;
      }
    }

    // LOGIKA CAIRAN
    function updateCairan() {
      const b = parseFloat(document.getElementById('berat-cairan').value) || 0;
      const sp = document.getElementById('spesies-cairan').value;
      const kon = document.getElementById('kondisi').value;
      
      const rate = sp === 'anjing' ? 5 : 4;
      const maint = Math.round(rate * b);
      const defisit = kon === 'maintenance' ? 0 : (kon === 'dehidrasi-5' ? b * 50 : b * 100);

      document.getElementById('cairan-maintenance').innerText = maint;
      document.getElementById('cairan-defisit').innerText = Math.round(defisit);
    }

    // EVENT LISTENERS
    document.getElementById('berat').oninput = updateKonversi;
    document.getElementById('satuan').onchange = updateKonversi;
    document.getElementById('target-satuan').onchange = updateKonversi;

    document.getElementById('spesies-dosis').onchange = updateDosis;
    document.getElementById('obat').onchange = updateDosis;
    document.getElementById('berat-dosis').oninput = updateDosis;

    document.getElementById('spesies-cairan').onchange = updateCairan;
    document.getElementById('berat-cairan').oninput = updateCairan;
    document.getElementById('kondisi').onchange = updateCairan;
  </script>
</body>
</html>
